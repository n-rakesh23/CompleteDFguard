name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'dfguard/backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dfguard/backend/**'

jobs:
  test:
    name: Install & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dfguard/backend/package-lock.json

      - name: Install dependencies
        working-directory: dfguard/backend
        run: npm ci

      - name: Run tests
        working-directory: dfguard/backend
        run: npm test
        env:
          NODE_ENV: test

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/${{ secrets.EC2_USER }}/dfguard/backend
            git pull origin main
            npm ci --production
            pm2 restart dfguard-backend || pm2 start server.js --name dfguard-backend
            pm2 save

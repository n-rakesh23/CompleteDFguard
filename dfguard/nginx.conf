# ============================================================
# /etc/nginx/sites-available/dfguard
# Copy this file to EC2 after SSL cert is generated
#
# Setup:
#   sudo cp nginx.conf /etc/nginx/sites-available/dfguard
#   sudo ln -sf /etc/nginx/sites-available/dfguard \
#               /etc/nginx/sites-enabled/dfguard
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Let's Encrypt renewal verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    server_name yourdomain.com www.yourdomain.com;

    # SSL certificates from Certbot / Let's Encrypt
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;

    # Strong SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options            "DENY"                                always;
    add_header X-Content-Type-Options     "nosniff"                             always;
    add_header X-XSS-Protection           "1; mode=block"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin"     always;

    # ── React Frontend ─────────────────────────────────────
    location / {
        root  /home/ubuntu/dfguard/frontend/dist;
        index index.html;

        # SPA routing — unknown paths go to React Router
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires     30d;
            add_header  Cache-Control "public, immutable";
        }
    }

    # ── Node.js API ────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout  60s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;

        # Don't cache API responses
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ── Health check endpoint ──────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
    }

    # ── Block hidden files (.env, .git etc.) ──────────────
    location ~ /\. {
        deny all;
        return 404;
    }

    # Gzip compression
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/xml text/javascript
                    application/javascript application/json
                    application/xml+rss image/svg+xml;
}
